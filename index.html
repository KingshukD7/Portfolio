    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, memo } = React;

        // Window component moved OUTSIDE to prevent recreation on parent re-renders
        const Window = memo(({ win, isActive, onMinimize, onClose, onFocus }) => {
            if (win.minimized) return null;

            return (
                <div 
                    className={`window ${isActive ? 'active' : ''}`}
                    style={{
                        left: win.position.x,
                        top: win.position.y,
                        width: win.size.width,
                        height: win.size.height
                    }}
                    onClick={onFocus}
                >
                    <div className="window-header">
                        <div className="window-title">
                            <span>{win.icon}</span>
                            <span>{win.name}</span>
                        </div>
                        <div className="window-controls">
                            <button className="window-btn" onClick={(e) => {
                                e.stopPropagation();
                                onMinimize();
                            }}>
                                <span>−</span>
                            </button>
                            <button className="window-btn close" onClick={(e) => {
                                e.stopPropagation();
                                onClose();
                            }}>
                                <span>×</span>
                            </button>
                        </div>
                    </div>
                    <div 
                        className="window-content"
                        dangerouslySetInnerHTML={{ __html: win.content }}
                    />
                </div>
            );
        });

        function GameOSPortfolio() {
            const [bootComplete, setBootComplete] = useState(false);
            const [bootProgress, setBootProgress] = useState(0);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [windows, setWindows] = useState([]);
            const [activeWindow, setActiveWindow] = useState(null);
            const [showStartMenu, setShowStartMenu] = useState(false);
            const canvasRef = useRef(null);

            // Boot sequence
            useEffect(() => {
                if (!bootComplete) {
                    const interval = setInterval(() => {
                        setBootProgress(prev => {
                            if (prev >= 100) {
                                clearInterval(interval);
                                setTimeout(() => setBootComplete(true), 500);
                                return 100;
                            }
                            return prev + 2;
                        });
                    }, 50);
                    return () => clearInterval(interval);
                }
            }, [bootComplete]);

            // Clock
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 3D Background
            useEffect(() => {
                if (!bootComplete || !canvasRef.current || !window.THREE) return;

                const THREE = window.THREE;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ 
                    canvas: canvasRef.current, 
                    alpha: true,
                    antialias: true
                });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.position.z = 5;

                const geometry = new THREE.IcosahedronGeometry(1.5, 1);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x14b8a6, 
                    wireframe: true,
                    transparent: true,
                    opacity: 0.1
                });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);

                const particles = new THREE.BufferGeometry();
                const particleCount = 1000;
                const positions = new Float32Array(particleCount * 3);
                
                for (let i = 0; i < particleCount * 3; i++) {
                    positions[i] = (Math.random() - 0.5) * 10;
                }
                
                particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const particleMaterial = new THREE.PointsMaterial({ 
                    color: 0xf97316, 
                    size: 0.02,
                    transparent: true,
                    opacity: 0.6
                });
                const particleSystem = new THREE.Points(particles, particleMaterial);
                scene.add(particleSystem);

                function animate() {
                    requestAnimationFrame(animate);
                    mesh.rotation.x += 0.001;
                    mesh.rotation.y += 0.002;
                    particleSystem.rotation.y += 0.0005;
                    renderer.render(scene, camera);
                }
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    renderer.dispose();
                };
            }, [bootComplete]);

            const apps = [

                            <div style="margin-bottom: 2rem;">

                            </div>

                            <div style="background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 1.5rem;">
                                <h3 style="font-weight: bold; color: #f97316; margin-bottom: 1rem;">At a Glance:</h3>
                                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 0.5rem;">

                                    </div>
                                    <div style="background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 0.5rem;">

                                <p style="color: #d1d5db; font-size: 0.875rem; line-height: 1.6;"><strong style="color: #f97316;">Currently:</strong> Open to full-time Software Engineer roles in Sydney. The performance mindset from shipping real-time interactive applications — frame-rate optimization, efficient memory management, seamless UX under load — translates directly to building high-traffic web platforms.</p>
                            </div>
                        </div>
                    `
                },

                            <p style="color: #d1d5db; margin-bottom: 1rem; line-height: 1.6;">An interactive web application that visualizes four fundamental pathfinding algorithms in real-time. Built to bridge the gap between theoretical computer science and practical game AI, helping developers understand how different algorithms behave and when to use each approach.</p>
                            
                            <div style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 0.5rem; margin: 1rem 0;">
                                <h3 style="font-weight: bold; color: #10b981; margin-bottom: 0.5rem;">Algorithm Implementations:</h3>
                                <ul style="color: #d1d5db; font-size: 0.875rem; line-height: 1.6; padding-left: 1.5rem;">
                                    <li><strong>A* Search:</strong> Uses f(n) = g(n) + h(n) cost function where g(n) is distance from start and h(n) is Manhattan distance heuristic to goal. Maintains priority queue (min-heap) to always explore most promising nodes first. Guarantees shortest path while being computationally efficient. Best for game AI where you need optimal paths quickly (RTS unit movement, open-world navigation)</li>
                                    <li><strong>Dijkstra's Algorithm:</strong> Uniform-cost search that explores nodes based on lowest cumulative cost from start. Uses priority queue to select minimum distance node each iteration. Guarantees shortest path but explores more nodes than A* since it lacks directional heuristic. Useful when path cost varies significantly or when no good heuristic exists</li>
                                    <li><strong>Breadth-First Search (BFS):</strong> Explores graph level-by-level using queue data structure. Visits all neighbors at distance k before visiting any nodes at distance k+1. Guarantees shortest path in unweighted graphs. Simple to implement and optimal for grid-based games where all moves have equal cost</li>
                                    <li><strong>Depth-First Search (DFS):</strong> Uses stack to explore as far as possible along each branch before backtracking. Does NOT guarantee shortest path but uses minimal memory. Demonstrates trade-off between path optimality and computational resources. Useful for maze generation and connectivity testing</li>

                                    <li><strong>Cells Explored:</strong> A* typically visits 30-40% fewer cells than Dijkstra due to heuristic guidance. DFS may explore entire grid in worst case. BFS explores systematically in expanding circles</li>
